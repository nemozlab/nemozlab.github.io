<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="https://www.google.com/s2/favicons?domain=nemoz.io&sz=64">
<meta name="description" content="Nemoz Staff 생산성 도구 모음">
<meta property="og:title" content="Nemoz Staff Tools">
<meta property="og:description" content="Nemoz Staff 생산성 도구 모음">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Nemoz Staff Tools">
<meta name="twitter:description" content="Nemoz Staff 생산성 도구 모음">

<!-- Pretendard (영문+한글 통합, 모던) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<!-- Noto Sans KR (한글 본문 보조) -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#EFF5F5;
  --card:#fff;
  --accent:#00C3C8;
  --accent-dark:#009EA3;
  --text:#2C3E3E;
  --muted:#7FA0A0;
  --font-head:'Pretendard Variable',sans-serif;
  --font-body:'Noto Sans KR','Pretendard Variable',sans-serif;
}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.container{
  max-width:720px;
  width:100%;
  padding:40px 20px;
  text-align:center;
}
.logo{
  height:42px;
  margin-bottom:8px;
}
.title{
  font-family:var(--font-head);
  font-size:32px;
  font-weight:700;
  letter-spacing:2px;
  margin-bottom:6px;
  color:var(--text);
}
.subtitle{
  font-family:var(--font-body);
  font-size:14px;
  color:var(--muted);
  letter-spacing:3px;
  font-weight:400;
  margin-bottom:48px;
}
.tools{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:24px;
}
.card{
  background:var(--card);
  border-radius:20px;
  padding:32px 28px;
  box-shadow:0 4px 20px rgba(0,195,200,.1);
  border:2px solid #E0F7F7;
  transition:all .2s;
  text-decoration:none;
  color:inherit;
}
.card:hover{
  transform:translateY(-6px);
  border-color:var(--accent);
  box-shadow:0 12px 32px rgba(0,195,200,.2);
}
.card h2{
  font-family:var(--font-head);
  font-size:22px;
  font-weight:700;
  margin-bottom:8px;
  color:var(--accent-dark);
  letter-spacing:-.01em;
}
.card p{
  font-family:var(--font-body);
  font-size:13px;
  color:var(--muted);
  line-height:1.6;
  font-weight:400;
}
.btn{
  margin-top:24px;
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:var(--accent);
  color:#fff;
  padding:14px 32px;
  border-radius:12px;
  font-family:var(--font-head);
  font-weight:700;
  font-size:15px;
  text-decoration:none;
  transition:all .2s;
}
.btn:hover{
  background:var(--accent-dark);
  transform:scale(1.05);
}
</style>
</head>
<body>

<div class="container">
  <img src="https://nemozlab.github.io/label/images/nemoz_logo.png" alt="NEMOZ" class="logo">
  <div class="title">NEMOZ STAFF TOOLS</div>
  <div class="subtitle">내부용 도구 모음</div>

  <div class="tools">

    <a href="https://nemozlab.github.io/label/" target="_blank" class="card">
      <h2>라벨 생성기</h2>
      <p>구글 시트 연동 박스 라벨<br>자동 생성 및 PDF 출력</p>
      <div class="btn">라벨 생성기 열기 →</div>
    </a>

    <a href="nemoz-price-calc.html" target="_blank" class="card">
      <h2>가격 계산기</h2>
      <p>출고가 · 판매가 · 정가<br>자동 계산 및 역산 도구</p>
      <div class="btn">가격 계산기 열기 →</div>
    </a>

  </div>

  <div style="margin-top:60px; font-size:12px; color:#9BBDBD; font-family:var(--font-head);">
    Nemoz Lab © 2026 &nbsp; | &nbsp; Staff Only
  </div>
</div>

</body>
</html>
