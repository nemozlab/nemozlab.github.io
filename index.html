<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nemoz Staff Tools</title>

<link rel="icon" type="image/png" href="https://www.google.com/s2/favicons?domain=nemoz.io&sz=64">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">

<style>
:root {
  --bg: #ffffff;
  --card: #ffffff;
  --accent: #00C3C8;
  --text-main: #1F2929; /* 더 짙은 색상으로 변경하여 가독성 강화 */
  --text-sub: #4A5F5F;  /* 흐릿했던 회색을 진한 회색으로 변경 */
  --text-muted: #8EAAAA; /* 푸터 등 보조 텍스트용 */
  --border: #E8EDED;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Pretendard Variable', sans-serif;
  background-color: var(--bg);
  color: var(--text-main);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  max-width: 800px;
  width: 100%;
  padding: 40px 24px;
}

/* 상단 섹션 */
.header {
  text-align: center;
  margin-bottom: 56px;
}

.logo {
  height: 42px;
  margin-bottom: 12px;
}

.title {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: 2px;
  margin-bottom: 8px;
  color: var(--text-main);
}

.subtitle {
  font-size: 15px; /* 조금 더 크게 */
  color: var(--text-sub); /* 더 진하게 */
  letter-spacing: 3px;
  font-weight: 500;
}

/* 도구 리스트 */
.tools {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
  gap: 20px;
}

.card {
  background: var(--card);
  border-radius: 18px;
  padding: 32px;
  text-decoration: none;
  color: inherit;
  border: 1px solid var(--border);
  transition: all 0.25s ease-out;
  display: flex;
  flex-direction: column;
}

.card:hover {
  border-color: var(--accent);
  background-color: #faffff;
  box-shadow: 0 12px 30px rgba(0, 195, 200, 0.08);
  transform: translateY(-4px);
}

.card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}

.icon {
  width: 24px;
  height: 24px;
  color: var(--accent);
  flex-shrink: 0;
}

.card h2 {
  font-size: 22px;
  font-weight: 700;
  color: var(--text-main); /* 제목 강조 */
}

.card p {
  font-size: 15px; /* 가독성을 위해 살짝 키움 */
  color: var(--text-sub); /* 본문 텍스트 진하게 변경 */
  line-height: 1.6;
  margin-bottom: 24px;
  word-break: keep-all;
}

.more-link {
  font-size: 14px;
  font-weight: 700;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: auto;
}

.more-link span {
  transition: transform 0.2s;
}

.card:hover .more-link span {
  transform: translateX(4px);
}

footer {
  margin-top: 80px;
  text-align: center;
  font-size: 13px;
  color: var(--text-muted);
  letter-spacing: 1px;
}

@media (max-width: 600px) {
  .title { font-size: 26px; }
  .tools { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="container">
  <header class="header">
    <img src="https://nemozlab.github.io/label/images/nemoz_logo.png" alt="NEMOZ" class="logo">
    <div class="title">NEMOZ STAFF TOOLS</div>
    <div class="subtitle">내부용 생산성 도구 모음</div>
  </header>

  <main class="tools">
    <a href="https://nemozlab.github.io/label/" target="_blank" class="card">
      <div class="card-header">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 8h10M7 12h10M7 16h6"/></svg>
        <h2>라벨 생성기</h2>
      </div>
      <p>구글 시트 데이터를 연동하여 박스 라벨을 자동으로 디자인하고 PDF로 즉시 출력합니다.</p>
      <div class="more-link">도구 열기 <span>→</span></div>
    </a>

    <a href="nemoz-price-calc.html" target="_blank" class="card">
      <div class="card-header">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 6h8M12 10h.01M8 10h.01M16 10h.01M12 14h.01M8 14h.01M16 14h.01M12 18h.01M8 18h.01M16 18h.01"/></svg>
        <h2>가격 계산기</h2>
      </div>
      <p>출고가, 판매가, 정가 사이의 복잡한 마진율을 자동으로 계산하고 역산해주는 도구입니다.</p>
      <div class="more-link">도구 열기 <span>→</span></div>
    </a>
  </main>

  <footer>
    Nemoz Lab © 2026 &nbsp; | &nbsp; Staff Only
  </footer>
</div>

</body>
</html>
